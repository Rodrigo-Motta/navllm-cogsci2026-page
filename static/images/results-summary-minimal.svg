<svg width="1400" height="710" viewBox="0 0 1400 710" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Minimal summary of human versus LLM semantic search</title>
  <desc id="desc">Minimal comparison showing broader human trajectories, tighter LLM trajectories, and a compact metric summary.</desc>
  <rect width="1400" height="710" fill="white"/>

  <text x="100" y="86" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Main result</text>
  <text x="100" y="120" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Humans explore semantic space more broadly and less predictably than current LLMs.</text>

  <rect x="90" y="180" width="500" height="340" rx="18" fill="white" stroke="#CBD5E1" stroke-width="2"/>
  <text x="130" y="222" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">Humans</text>
  <text x="130" y="250" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="15">Higher entropy · larger jumps</text>
  <text x="130" y="272" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="15">broader dispersion</text>
  <circle cx="198" cy="338" r="8" fill="#94A3B8"/>
  <circle cx="270" cy="300" r="8" fill="#94A3B8"/>
  <circle cx="388" cy="316" r="8" fill="#94A3B8"/>
  <circle cx="470" cy="422" r="8" fill="#94A3B8"/>
  <circle cx="248" cy="448" r="8" fill="#94A3B8"/>
  <circle cx="360" cy="404" r="8" fill="#94A3B8"/>
  <path d="M198 338L270 300L388 316L470 422L360 404L248 448" stroke="#2563EB" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="338" cy="366" r="56" stroke="#CBD5E1" stroke-dasharray="8 8" stroke-width="2" fill="none"/>
  <text x="130" y="484" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="16">Cross-cluster moves remain common.</text>
  <text x="130" y="506" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="16">The search footprint is wider.</text>

  <rect x="640" y="180" width="500" height="340" rx="18" fill="white" stroke="#CBD5E1" stroke-width="2"/>
  <text x="680" y="222" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">LLMs</text>
  <text x="680" y="250" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="15">Lower entropy · smaller jumps</text>
  <text x="680" y="272" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="15">tighter clustering</text>
  <circle cx="860" cy="370" r="30" stroke="#CBD5E1" stroke-dasharray="8 8" stroke-width="2" fill="none"/>
  <circle cx="804" cy="358" r="8" fill="#94A3B8"/>
  <circle cx="846" cy="338" r="8" fill="#94A3B8"/>
  <circle cx="878" cy="360" r="8" fill="#94A3B8"/>
  <circle cx="908" cy="346" r="8" fill="#94A3B8"/>
  <circle cx="924" cy="376" r="8" fill="#94A3B8"/>
  <circle cx="888" cy="396" r="8" fill="#94A3B8"/>
  <path d="M804 358L846 338L878 360L908 346L924 376L888 396" stroke="#0F172A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="680" y="484" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="16">Trajectories remain near local,</text>
  <text x="680" y="506" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="16">high-probability continuations.</text>

  <rect x="1160" y="180" width="170" height="340" rx="18" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="1245" y="222" text-anchor="middle" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">Summary</text>
  <text x="1190" y="274" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15">Entropy</text>
  <path d="M1190 288H1295" stroke="#E2E8F0" stroke-width="8" stroke-linecap="round"/>
  <path d="M1190 288H1272" stroke="#2563EB" stroke-width="8" stroke-linecap="round"/>
  <text x="1190" y="338" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15">Dist. to next</text>
  <path d="M1190 352H1295" stroke="#E2E8F0" stroke-width="8" stroke-linecap="round"/>
  <path d="M1190 352H1266" stroke="#2563EB" stroke-width="8" stroke-linecap="round"/>
  <text x="1190" y="402" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15">Dist. to</text>
  <text x="1190" y="424" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15">centroid</text>
  <path d="M1190 448H1295" stroke="#E2E8F0" stroke-width="8" stroke-linecap="round"/>
  <path d="M1190 448H1260" stroke="#2563EB" stroke-width="8" stroke-linecap="round"/>
  <text x="1190" y="484" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="12">Blue marks the</text>
  <text x="1190" y="501" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="12">human direction</text>
  <text x="1190" y="518" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="12">of effect.</text>

  <rect x="90" y="554" width="1240" height="78" rx="12" fill="#F8FAFC"/>
  <text x="710" y="585" text-anchor="middle" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="16">Temperature tuning can match isolated metrics,</text>
  <text x="710" y="609" text-anchor="middle" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="16">but no model-temperature setting reproduces the full human profile jointly.</text>
</svg>
